<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <style>
    @font-face {
  font-family: 'Figtree';
  src: url('./assets/fonts/Figtree-VariableFont_wght.ttf') format('truetype');

  /* Mobile Screens */
@media screen and (max-width: 375px){
    body {
      background-color: #F4D04E;
    }
    .content-container{
      box-shadow: 10px 10px 0px hsl(0, 0%, 7%);
      width: 327px;
      height: 501px;
      border-radius: 20px;
      border: 2px solid black;
      background-color: hsl(0, 0%, 100%);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
      margin: 156px 24px;
    }

    
    .img-illustration {
      border-radius: 20px;
      width: 279px;
      height: 200px;

    }

    .content-flex-container {
      width: 279px;
      height: 173px;
      border: 2px solid #F4D04E;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0px;
    }
    
    #learning {
      font-size: 18px;
      text-align: center;
      font-weight: bold;
      font-family: 'Figtree';
      border-radius: 4px;
      background-color: #F4D04E;
      width: 73px;
      height: 26px;
      padding: 4px 12px;
      margin-top: 0px;
    }

    .publish-date {
      font-family: 'Figtree';
      font-size: 16px;
      width: 123px;
      height: 18px;
    }

    .header {
      /* color: #F4D04E; */
      color: hsl(0, 0%, 7%);
      font-family: "Figtree";
      font-weight: 800;
      width: 279px;
      height: 30px;
    }
    .header:hover{
       color: #F4D04E;
    }
    .header:active{
       color: #F4D04E;
    }
    .header.focus{
       color: #F4D04E;
    }

    .header-content {
      color: hsl(0, 0%, 42%);
      font-family: "Figtree";
      width: 279px;
      height: 63px;
      margin-bottom: 0px;
      
    }

    .author{
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      width: 129px;
      margin-top: 32px;


    }
    .author-pic {
      border-radius: 100%;
      width: 32px;
      height: 32px;
    }
    .author-name {
      font-family: "Figtree";
      font-weight: 800;
      width: 85;
      padding-top:5px;
      padding-bottom: 5px; 
    }

}
